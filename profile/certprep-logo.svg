<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200" version="1.1" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="badgeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="400" height="200" fill="#0f172a" rx="20"/>
<!--Badge / Certificate Icon-->
  <g transform="translate(45, 55)">
    <path d="M0 20 L20 0 L80 0 L100 20 L100 60 L80 80 L20 80 L0 60 Z" fill="none" stroke="url(#badgeGrad)" stroke-width="4"/>
    <path d="M0 20 L20 0 L80 0 L100 20 L100 60 L80 80 L20 80 L0 60 Z" fill="url(#badgeGrad)" opacity="0.15"/>
    <path d="M30 40 L45 55 L70 25" fill="none" stroke="url(#badgeGrad)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  </g>
<!--CERTPREP Text-->
  <text x="270" y="105" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-weight="800" font-size="42" text-anchor="middle" fill="url(#textGrad)" letter-spacing="2">
    CERTPREP
  </text>
<!--Tagline-->
  <text x="270" y="130" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-weight="500" font-size="14" text-anchor="middle" fill="#64748b" letter-spacing="4">
    LEARN • CERTIFY
  </text>
</svg>
